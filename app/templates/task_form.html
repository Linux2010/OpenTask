{% extends "base.html" %}
{% block title %}快速派任务 - OpenTask{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">快速派任务</h1>

        <form hx-post="/web/api/tasks/create"
              hx-target="#result-message"
              hx-swap="innerHTML"
              hx-indicator="#loading-indicator"
              class="space-y-6">
            <!-- Task Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">任务名称 *</label>
                <input type="text"
                       name="task_name"
                       required
                       placeholder="输入任务名称"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- Task Description -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">任务描述</label>
                <textarea name="task_description"
                          rows="2"
                          placeholder="输入任务描述（可选）"
                          class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <!-- Assign To -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">分配给 Agent *</label>
                <select name="assigned_to"
                        required
                        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    {% for bot in bots %}
                    <option value="{{ bot }}" {% if bot == 'anna' %}selected{% endif %}>{{ bot }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Priority -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">优先级</label>
                <select name="priority"
                        class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="P0">P0 - 紧急</option>
                    <option value="P1">P1 - 重要</option>
                    <option value="P2" selected>P2 - 一般</option>
                </select>
            </div>

            <!-- Task Parameters (Key-Value) -->
            <div class="border-t border-gray-200 pt-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">任务参数（可选）</h3>
                <div class="space-y-4">
                    <!-- Param 1 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">参数名 1</label>
                            <input type="text"
                                   name="param_key_1"
                                   placeholder="如: target"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">参数值 1</label>
                            <input type="text"
                                   name="param_value_1"
                                   placeholder="如: hope02"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                    </div>
                    <!-- Param 2 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">参数名 2</label>
                            <input type="text"
                                   name="param_key_2"
                                   placeholder="如: action"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">参数值 2</label>
                            <input type="text"
                                   name="param_value_2"
                                   placeholder="如: upload"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                    </div>
                    <!-- Param 3 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">参数名 3</label>
                            <input type="text"
                                   name="param_key_3"
                                   placeholder="如: timeout"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">参数值 3</label>
                            <input type="text"
                                   name="param_value_3"
                                   placeholder="如: 300"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hidden field -->
            <input type="hidden" name="created_by" value="admin">

            <!-- Submit Buttons -->
            <div class="flex justify-between items-center pt-6 border-t border-gray-200">
                <a href="/web/tasks" class="text-gray-600 hover:text-gray-800">返回任务列表</a>
                <button type="submit"
                        class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition font-medium">
                    创建任务
                </button>
            </div>
        </form>

        <!-- Result Message -->
        <div id="result-message" class="mt-6"></div>
    </div>
</div>
{% endblock %}
