<div class="p-6">
    <h3 class="text-lg font-medium text-gray-900 mb-4">标记任务 #{{ task.id }} 完成</h3>
    <form hx-post="/web/api/tasks/{{ task.id }}/complete"
          hx-target="#action-result"
          hx-swap="innerHTML"
          _="on htmx:afterSwap remove .show from #modal"
          hx-indicator="#loading-indicator">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">执行结果 *</label>
            <textarea name="result"
                      required
                      rows="3"
                      placeholder="输入执行结果"
                      class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"></textarea>
        </div>
        <div class="flex justify-end gap-3">
            <button type="button"
                    _="on click remove .show from #modal"
                    class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300">
                取消
            </button>
            <button type="submit"
                    class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600">
                确认完成
            </button>
        </div>
    </form>
    <script>document.getElementById('modal').classList.add('show');</script>
</div>
