{% if logs %}
<table class="min-w-full divide-y divide-gray-200 text-sm">
    <thead class="bg-gray-50">
        <tr>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">动作</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">原状态</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">新状态</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">信息</th>
            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500">时间</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-gray-200">
        {% for log in logs %}
        <tr>
            <td class="px-3 py-2 text-gray-900">{{ log.action }}</td>
            <td class="px-3 py-2 text-gray-600">{{ log.old_status or '-' }}</td>
            <td class="px-3 py-2 text-gray-600">{{ log.new_status or '-' }}</td>
            <td class="px-3 py-2 text-gray-500 truncate max-w-xs">{{ log.message or '-' }}</td>
            <td class="px-3 py-2 text-gray-500">{{ log.created_time }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-gray-500">暂无日志</p>
{% endif %}
